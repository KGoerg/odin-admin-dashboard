<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>
                <span class="icon-wrapper"> <img src="/icons/cat.svg" alt="A simple logo image of a cat's face" class="icon-image filter-white"></span>
                Dashboard
            </h1>
            <ul class="navigational-sidebar-buttons">
                <li><span class="navigational-symbol filter-white"><img src="./icons/home.svg" alt="An icon of a house"></span>Home</li>
                <li><span class="navigational-symbol filter-white"><img src="./icons/profile.svg" alt="An icon indicating a profile"></span>Profile</li>
                <li><span class="navigational-symbol filter-white"><img src="./icons/message.svg" alt="An icon of a message bubble"></span>Messages</li>
                <li><span class="navigational-symbol filter-white"><img src="./icons/history.svg" alt="An icon of a clock"></span>History</li>
                <li><span class="navigational-symbol filter-white"><img src="./icons/tasks.svg" alt="An icon of two files"></span>Tasks</li>
                <li><span class="navigational-symbol filter-white"><img src="./icons/communities.svg" alt="An icon of a group of people"></span>Communities</li>
            </ul>

            <ul class="branding-sidebar-buttons">
                <li><span class="branding-symbol filter-white"><img src="./icons/settings.svg" alt="An icon of a gear"></span>Settings</li>
                <li><span class="branding-symbol filter-white"><img src="./icons/support.svg"alt="A block containing a question mark"></span>Support</li>
                <li><span><img src="./icons/privacy.svg" class="branding-symbol filter-white" alt="A shield icon containing a checkmark"></span>Privacy</li>
            </ul>
        </div>

        <div class="header">
            <p>This is a header</p>
        </div>

        <div class="main-content">
            <p>This is the main body</p>
        </div>
    </div>
</body>
</html>
